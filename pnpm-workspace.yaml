  "@types/react": ^19.1.8
  "@types/react-dom": ^19.1.6
  "@testing-library/react": ^16.3.0
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/user-event": ^14.6.1
  jsdom: ^26.1.0
  "@vitejs/plugin-react": ^4.7.0
  tailwindcss: ^4.1.11
  "@tailwindcss/postcss": ^4.1.11
  sonner: ^2.0.7
  next-themes: ^0.4.6
