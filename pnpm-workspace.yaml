packages:
  - "apps/*"
  - "packages/*"
  - "packages/features/*"

allowBuilds:
  '@depot/cli': set this to true or false
  '@prisma/client': set this to true or false
  '@swc/core': set this to true or false
  better-sqlite3: set this to true or false
  esbuild: set this to true or false
  msw: set this to true or false
