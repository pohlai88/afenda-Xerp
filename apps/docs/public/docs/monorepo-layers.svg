<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" role="img" aria-label="Afenda monorepo layers: apps above packages">
  <title>Afenda monorepo layers</title>
  <rect width="640" height="280" fill="#faf9f7" rx="8"/>
  <text x="320" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Afenda monorepo (simplified)</text>
  <rect x="40" y="52" width="560" height="72" fill="#fff" stroke="#d4d4d4" rx="6"/>
  <text x="56" y="76" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#404040">apps/</text>
  <text x="56" y="98" font-family="system-ui,sans-serif" font-size="11" fill="#525252">@afenda/erp | @afenda/docs | @afenda/storybook</text>
  <rect x="40" y="140" width="560" height="88" fill="#fff" stroke="#d4d4d4" rx="6"/>
  <text x="56" y="164" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#404040">packages/</text>
  <text x="56" y="186" font-family="system-ui,sans-serif" font-size="11" fill="#525252">database | kernel | permissions | ui | appshell | ...</text>
  <text x="56" y="208" font-family="system-ui,sans-serif" font-size="10" fill="#737373">Governance docs: repo-root docs/ (not rendered by Fumadocs)</text>
  <path d="M320 124v16" stroke="#a3a3a3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#a3a3a3"/>
    </marker>
  </defs>
  <text x="320" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#737373">apps may depend on packages - not the reverse</text>
</svg>
