name: Preview Docs

# TIP-032 Slice 6 — @afenda/docs preview deployment
#
# Separate Vercel project from ERP (@afenda/erp). No shared auth/database secrets.
# Skips gracefully when VERCEL_PROJECT_ID_DOCS is not configured.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: preview-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  preview-policy:
    name: Preview policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate preview policy
        env:
          VERCEL_ENV: preview
        run: pnpm quality:preview-policy

  vercel-preview-docs:
    name: Vercel docs preview
    needs: preview-policy
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: preview-docs

    env:
      VERCEL_ENV: preview
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify docs build before preview
        run: pnpm --filter @afenda/docs typecheck && pnpm --filter @afenda/docs test:run && pnpm --filter @afenda/docs build

      - name: Pull Vercel preview environment
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: pnpm dlx vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel preview
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: pnpm dlx vercel@latest build --token="$VERCEL_TOKEN"

      - name: Deploy Vercel preview
        id: deploy
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: |
          DEPLOYMENT_URL=$(pnpm dlx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Comment docs preview URL on PR
        if: ${{ steps.deploy.outputs.url != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              '### Docs preview deployment ready',
              '',
              `**URL:** ${url}`,
              `**Commit:** \`${sha}\``,
              '',
              '_Isolated @afenda/docs preview — no ERP secrets._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Docs preview deployment ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Skip Vercel deploy without docs secrets
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' }}
        run: echo "Docs preview skipped — configure VERCEL_PROJECT_ID_DOCS for @afenda/docs deploys."

      - name: Summarise docs preview result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## Docs preview: DEPLOYED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "${{ steps.deploy.outputs.url }}" ]; then
              echo "Preview URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "## Docs preview: FAILED" >> "$GITHUB_STEP_SUMMARY"
          fi
