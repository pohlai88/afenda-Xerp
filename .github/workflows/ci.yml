name: CI

# TIP-009 — Delivery Governance Spine
#
# Pull requests to main must pass all gates before merge.
# Test pyramid jobs run in parallel (ARCH-TEST-001 Gate 3i / Gate 3j).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-vitest:
    name: Gate 3 · Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gate 3 · test (affected on PR)
        if: github.event_name == 'pull_request'
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: pnpm test:run:affected

      - name: Gate 3 · test (full on main)
        if: github.event_name != 'pull_request'
        run: pnpm test:run

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-vitest
          path: test-results/junit.xml
          if-no-files-found: ignore

  test-interaction:
    name: Gate 3i · Interaction
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gate 3i · interaction tests
        run: pnpm test:interaction

  test-storybook:
    name: Gate 3a · Storybook browser
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gate 3a · storybook browser tests
        run: pnpm test:run:storybook

  test-e2e-smoke:
    # ADR-0027 skeleton: apps/erp/e2e/@smoke specs deferred post-reset.
    # Re-enable when Playwright smoke suite returns; script wired in apps/erp/package.json.
    if: false
    name: Gate 3j · ERP E2E smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble

    env:
      CI: true
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AFENDA_DEV_LOGIN_PASSWORD: ${{ secrets.AFENDA_DEV_LOGIN_PASSWORD }}
      PLAYWRIGHT_PREBUILT: "true"
      AFENDA_E2E_DEFAULT_TENANT_SLUG: "dev-local"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap local database and dev auth
        run: pnpm db:bootstrap:local && pnpm auth:bootstrap:dev

      - name: Build ERP and dependencies
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: pnpm turbo run build --filter=@afenda/erp...

      - name: Gate 3j · ERP Playwright smoke
        working-directory: apps/erp
        run: pnpm test:e2e:smoke

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-e2e
          path: apps/erp/blob-report
          if-no-files-found: ignore

  quality-governance:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test-vitest, test-interaction, test-storybook, test-e2e-smoke]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gate 0 · local artifact leakage (PAS-004A)
        run: pnpm check:local-artifact-leakage

      - name: Resolve Turbo scope
        id: turbo_scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "affected=--affected" >> "$GITHUB_OUTPUT"
          else
            echo "affected=" >> "$GITHUB_OUTPUT"
          fi

      # ── Gate 1 · Type Safety ──────────────────────────────────────────────
      - name: Gate 1 · typecheck
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: pnpm turbo run typecheck ${{ steps.turbo_scope.outputs.affected }}

      # ── Gate 2 · Code Quality ─────────────────────────────────────────────
      - name: Gate 2 · biome (format + lint + imports + editor sync)
        run: pnpm ci:biome

      - name: Gate 3cov · phase-1 coverage
        run: pnpm test:coverage:phase1

      - name: Gate 3cov · coverage summary
        run: pnpm check:coverage-summary

      # ── Gate 3b · PAS-006 downstream integration (ADR-0027) ───────────────
      - name: Gate 3b · downstream integration (no legacy UI packages)
        run: pnpm check:downstream-integration

      # ── Gate 3c · PAS-006 presentation type safety ───────────────────────
      - name: Gate 3c · shadcn-studio typecheck (PAS-006)
        run: pnpm --filter @afenda/shadcn-studio typecheck

      - name: Gate 3c2 · shadcn-studio path aliases (PAS-006 / ADR-0038)
        run: pnpm check:studio-paths

      - name: Gate 3d · ERP API contract governance (ADR-0030)
        run: pnpm check:api-contracts

      - name: Gate 3e · ERP module foundation quality
        run: pnpm quality:erp-module-foundation

      - name: Gate 3f · Documentation drift (PAS authority mirror)
        run: pnpm check:documentation-drift

      - name: Gate 3g · Knowledge corpus depth (PAS-004D B51)
        run: pnpm check:knowledge-corpus-depth

      - name: Gate 3h · Knowledge vocabulary richness (PAS-004D B52)
        run: pnpm check:knowledge-vocabulary-richness

      - name: Gate 3h2 · Code vocabulary coverage (PAS-004E B55)
        run: pnpm check:code-vocabulary-coverage

      - name: Gate 3i · Foundation disposition registry (ADR-0014)
        run: pnpm check:foundation-disposition

      - name: Gate 3j · System-admin mutation audit coverage (PKG007_ADMIN)
        run: pnpm check:system-admin-mutation-audit

      - name: Gate 3k · Accounting domain contracts-only (PKG-R01 / ADR-0015)
        run: pnpm check:accounting-domain-contracts

      # ── Gate 4 · Build Safety ─────────────────────────────────────────────
      - name: Gate 4 · build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: pnpm turbo run build ${{ steps.turbo_scope.outputs.affected }}

      # ── Gate 4b · Storybook static build (deployable docs) ────────────────
      - name: Gate 4b · storybook build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: pnpm turbo run storybook:build ${{ steps.turbo_scope.outputs.affected }}

      # ── Gate 4c · Fumadocs docs build (@afenda/docs — TIP-032) ───────────
      - name: Gate 4c · docs build
        run: pnpm quality:docs

      # ── Gate 5 · Boundary Safety ──────────────────────────────────────────
      - name: Gate 5 · package boundary check
        run: pnpm quality:boundaries

      # ── Gate 6 · Migration Safety ─────────────────────────────────────────
      - name: Gate 6 · Drizzle migration check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm quality:migrations

      # ── Gate 7 · Public API Safety ────────────────────────────────────────
      - name: Gate 7 · public export surface check
        run: pnpm quality:exports

      # ── Gate 8 · Architecture Authority ───────────────────────────────────
      - name: Gate 8 · architecture authority check
        run: pnpm quality:architecture

      - name: Gate 8b · architecture drift check
        run: pnpm quality:architecture-drift

      - name: Gate 8c · AI governance (PR scope)
        if: github.event_name == 'pull_request'
        run: |
          test -f .tip-scope.json || (echo "missing .tip-scope.json" && exit 1)
          pnpm quality:ai-governance -- --scope .tip-scope.json

      - name: Gate 8c · AI governance (baseline)
        if: github.event_name != 'pull_request'
        run: pnpm quality:ai-governance

      # ── Gate 8d · CSP third-party governance (static ERP scan) ────────────
      - name: Gate 8d · CSP third-party governance
        run: pnpm check:csp-third-party

      # ── Gate 8e · ERP observability governance (pino edge + metadata) ───
      - name: Gate 8e · ERP observability governance
        run: pnpm check:erp-observability

      # ── Gate 8e2 · ERP diagnostic logging governance (PKG013_LOGGING) ─
      - name: Gate 8e2 · ERP diagnostic logging governance
        run: pnpm check:erp-diagnostic-logging

      # ── Gate 8f · Phase 9 accounting readiness (structure + ERP parity) ─
      - name: Gate 8f · Phase 9 accounting readiness gate
        run: pnpm check:accounting-readiness-gate --structure-only

      # ── Gate 8g · PAS-001A skeleton integration spine (§6.1) ───────────
      - name: Gate · PAS-001A skeleton integration spine
        run: pnpm quality:pas001a-skeleton-gates

      # ── TIP-009 governance self-check ─────────────────────────────────────
      - name: Release gate check
        run: pnpm quality:release-gate

      - name: Summarise gate result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## CI: PASSED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "All TIP-009 gates passed on \`${{ github.ref_name }}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## CI: FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more TIP-009 gates failed. Merge is blocked." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`pnpm run ci\` locally to reproduce the failure before pushing again." >> "$GITHUB_STEP_SUMMARY"
          fi
