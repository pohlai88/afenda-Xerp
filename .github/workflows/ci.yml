name: CI

# TIP-009 — Delivery Governance Spine
#
# Pull requests to main must pass all gates before merge.
# Core gates: typecheck, biome, test, build, boundaries, migrations, exports,
# architecture authority, UI governance, storybook build, CSP third-party, release-gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Turbo scope
        id: turbo_scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "affected=--affected" >> "$GITHUB_OUTPUT"
          else
            echo "affected=" >> "$GITHUB_OUTPUT"
          fi

      # ── Gate 1 · Type Safety ──────────────────────────────────────────────
      - name: Gate 1 · typecheck
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: pnpm turbo run typecheck ${{ steps.turbo_scope.outputs.affected }}

      # ── Gate 2 · Code Quality ─────────────────────────────────────────────
      - name: Gate 2 · biome (format + lint + imports)
        run: pnpm ci:biome

      # ── Gate 3 · Test Quality ─────────────────────────────────────────────
      - name: Gate 3 · test (affected on PR)
        if: github.event_name == 'pull_request'
        run: pnpm test:run:affected

      - name: Gate 3 · test (full on main)
        if: github.event_name != 'pull_request'
        run: pnpm test:run

      - name: Gate 3a · storybook browser tests
        run: pnpm test:run:storybook

      # ── Gate 3b · UI Governance (behavioral + static) ─────────────────────
      - name: Gate 3b · UI governance
        run: pnpm --filter @afenda/ui check:governance

      # ── Gate 3c · Appshell consumer-layer TIP-004 ─────────────────────────
      - name: Gate 3c · appshell governance (TIP-004 consumption)
        run: pnpm --filter @afenda/appshell check:governance

      # ── Gate 4 · Build Safety ─────────────────────────────────────────────
      - name: Gate 4 · build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: pnpm turbo run build ${{ steps.turbo_scope.outputs.affected }}

      # ── Gate 4b · Storybook static build (deployable docs) ────────────────
      - name: Gate 4b · storybook build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
        run: pnpm turbo run storybook:build ${{ steps.turbo_scope.outputs.affected }}

      # ── Gate 4c · Fumadocs docs build (@afenda/docs — TIP-032) ───────────
      - name: Gate 4c · docs build
        run: pnpm quality:docs

      # ── Gate 5 · Boundary Safety ──────────────────────────────────────────
      - name: Gate 5 · package boundary check
        run: pnpm quality:boundaries

      # ── Gate 6 · Migration Safety ─────────────────────────────────────────
      - name: Gate 6 · Drizzle migration check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm quality:migrations

      # ── Gate 7 · Public API Safety ────────────────────────────────────────
      - name: Gate 7 · public export surface check
        run: pnpm quality:exports

      # ── Gate 8 · Architecture Authority ───────────────────────────────────
      - name: Gate 8 · architecture authority check
        run: pnpm quality:architecture

      - name: Gate 8b · architecture drift check
        run: pnpm quality:architecture-drift

      - name: Gate 8c · AI governance (PR scope)
        if: github.event_name == 'pull_request'
        run: |
          test -f .tip-scope.json || (echo "missing .tip-scope.json" && exit 1)
          pnpm quality:ai-governance -- --scope .tip-scope.json

      - name: Gate 8c · AI governance (baseline)
        if: github.event_name != 'pull_request'
        run: pnpm quality:ai-governance

      # ── Gate 8d · CSP third-party governance (static ERP scan) ────────────
      - name: Gate 8d · CSP third-party governance
        run: pnpm check:csp-third-party

      # ── Gate 8e · ERP observability governance (pino edge + metadata) ───
      - name: Gate 8e · ERP observability governance
        run: pnpm check:erp-observability

      # ── TIP-009 governance self-check ─────────────────────────────────────
      - name: Release gate check
        run: pnpm quality:release-gate

      # ── Artefacts ─────────────────────────────────────────────────────────
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: test-results/junit.xml
          if-no-files-found: ignore

      - name: Summarise gate result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## CI: PASSED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "All TIP-009 gates passed on \`${{ github.ref_name }}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## CI: FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more TIP-009 gates failed. Merge is blocked." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`pnpm run ci\` locally to reproduce the failure before pushing again." >> "$GITHUB_STEP_SUMMARY"
          fi
