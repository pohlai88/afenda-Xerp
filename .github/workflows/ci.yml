name: CI

# TIP-009 — Delivery Governance Spine
#
# Every pull request to main must pass all 7 gates before merge is permitted.
# No gate may be skipped. No release may bypass this pipeline.
#
# Gate 1  · typecheck       — type safety
# Gate 2  · lint            — code quality
# Gate 3  · test            — test quality
# Gate 4  · build           — build safety
# Gate 5  · boundaries      — package boundary safety
# Gate 6  · migrations      — migration integrity
# Gate 7  · exports         — public API surface safety
# Gate ∞  · release-gate    — TIP-009 governance self-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Gate 1 · Type Safety ──────────────────────────────────────────────
      - name: Gate 1 · typecheck
        run: pnpm typecheck

      # ── Gate 2 · Code Quality ─────────────────────────────────────────────
      - name: Gate 2 · biome (format + lint + imports)
        run: pnpm ci:biome

      # ── Gate 3 · Test Quality ─────────────────────────────────────────────
      - name: Gate 3 · test
        run: pnpm test:run

      # ── Gate 4 · Build Safety ─────────────────────────────────────────────
      - name: Gate 4 · build
        run: pnpm build

      # ── Gate 5 · Boundary Safety ──────────────────────────────────────────
      - name: Gate 5 · package boundary check
        run: pnpm quality:boundaries

      # ── Gate 6 · Migration Safety ─────────────────────────────────────────
      - name: Gate 6 · Drizzle migration check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm quality:migrations

      # ── Gate 7 · Public API Safety ────────────────────────────────────────
      - name: Gate 7 · public export surface check
        run: pnpm quality:exports

      # ── Gate 8 · Architecture Authority ───────────────────────────────────
      - name: Gate 8 · architecture authority check
        run: pnpm quality:architecture

      - name: Gate 8b · architecture drift check
        run: pnpm quality:architecture-drift

      - name: Gate 8c · AI governance (PR scope)
        if: github.event_name == 'pull_request'
        run: |
          test -f .tip-scope.json || (echo "missing .tip-scope.json" && exit 1)
          pnpm quality:ai-governance -- --scope .tip-scope.json

      - name: Gate 8c · AI governance (baseline)
        if: github.event_name != 'pull_request'
        run: pnpm quality:ai-governance

      # ── TIP-009 governance self-check ─────────────────────────────────────
      - name: Release gate check
        run: pnpm quality:release-gate

      # ── Artefacts ─────────────────────────────────────────────────────────
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: test-results/junit.xml
          if-no-files-found: ignore

      - name: Summarise gate result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## CI: PASSED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "All 7 TIP-009 gates passed on \`${{ github.ref_name }}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## CI: FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more TIP-009 gates failed. Merge is blocked." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`pnpm run ci\` locally to reproduce the failure before pushing again." >> "$GITHUB_STEP_SUMMARY"
          fi
