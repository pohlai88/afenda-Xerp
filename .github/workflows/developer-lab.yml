name: Developer Route Lab

# Advisory — Playwright smoke on port 3002 (no auth). Mirrors storybook-lab.yml pattern.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "apps/developer/**"
      - "packages/shadcn-studio-v2/**"
      - ".github/workflows/developer-lab.yml"

concurrency:
  group: developer-lab-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    name: Developer lab smoke (:3002)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync presentation package CSS dist
        run: |
          pnpm sync:package-css-dist -- --package @afenda/shadcn-studio-v2

      - name: Install Playwright Chromium
        run: pnpm --filter @afenda/developer exec playwright install chromium --with-deps

      - name: Run developer route-lab green-light delegate
        run: node scripts/governance/check-developer-route-lab-greenlight.mjs
